<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CloseWord</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    /* 避免 iOS 输入框聚焦时自动放大 */
    input[type="text"] {
      font-size: 16px;
    }
    /* 胜利行轻微脉冲 */
    @keyframes winPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .win-row {
      animation: winPulse 1.2s ease-in-out infinite;
    }
    /* Toast 弹入（内层缩放，不影响 fixed 居中） */
    @keyframes toastPop {
      from { opacity: 0; transform: scale(0.82); }
      to { opacity: 1; transform: scale(1); }
    }
    .toast-pop-inner {
      animation: toastPop 0.32s cubic-bezier(0.34, 1.45, 0.64, 1) forwards;
    }
    .toast-show {
      animation: none;
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .toast-hide {
      animation: toastOut 0.2s ease-in forwards;
    }
    /* 新猜测行高亮 */
    @keyframes rowHighlight {
      0% {
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.55);
        transform: scale(1.015);
      }
      100% {
        box-shadow: 0 0 0 0 transparent;
        transform: scale(1);
      }
    }
    .guess-row-highlight {
      animation: rowHighlight 1s ease-out;
      border-color: rgb(99 102 241) !important;
      z-index: 1;
    }
    /* 猜测列表：固定可视高度，框内滚动 */
    #guess-list {
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    /* Confetti 画布置于最底层 */
    #confetti-canvas {
      pointer-events: none;
    }
  </style>
</head>
<body class="box-border flex h-[100dvh] flex-col overflow-hidden bg-gradient-to-b from-slate-50 to-slate-100 text-slate-800 pb-[env(safe-area-inset-bottom)]">

  <!-- 浮动 Toast（不占文档流，避免挤压布局） -->
  <div id="toast" class="pointer-events-none fixed left-1/2 z-30 hidden w-[min(88vw,20rem)] -translate-x-1/2 rounded-xl px-5 py-3 text-center text-base font-semibold shadow-2xl" role="alert" style="bottom: calc(5.5rem + env(safe-area-inset-bottom, 0px));"></div>

  <!-- Confetti 全屏画布 -->
  <canvas id="confetti-canvas" class="fixed inset-0 z-40 w-full h-full"></canvas>

  <!-- 全屏胜利层 -->
  <div id="win-overlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm px-4" aria-hidden="true">
    <div class="relative w-full max-w-sm rounded-2xl bg-white p-8 text-center shadow-2xl">
      <div class="mb-4 text-5xl text-amber-400">
        <i class="fa-solid fa-trophy"></i>
      </div>
      <h2 id="win-title" class="mb-2 text-2xl font-bold text-emerald-600" data-i18n="winTitle">You got it!</h2>
      <p id="win-stats" class="mb-6 text-slate-600"></p>
      <button id="play-again-btn" type="button" class="h-12 w-full rounded-xl bg-emerald-500 text-lg font-semibold text-white shadow-lg transition active:scale-95 hover:bg-emerald-600" data-i18n="playAgain">
        Play again
      </button>
    </div>
  </div>

  <main class="relative z-10 mx-auto flex h-full min-h-0 w-full max-w-lg flex-col px-4 py-6">

    <!-- 顶栏：标题 + 语言切换 -->
    <header class="mb-4 shrink-0">
      <div class="mb-3 flex items-center justify-between">
        <h1 class="flex items-center gap-2 text-2xl font-bold tracking-tight">
          <i class="fa-solid fa-puzzle-piece text-indigo-500"></i>
          <span data-i18n="title">CloseWord</span>
        </h1>
        <!-- 语言切换 EN / 中文 -->
        <div class="flex rounded-full bg-slate-200 p-1 text-sm font-medium" role="group" aria-label="Language">
          <button type="button" id="lang-en" class="lang-btn rounded-full px-3 py-1.5 transition active:scale-95 bg-white text-indigo-600 shadow-sm" data-lang="en">EN</button>
          <button type="button" id="lang-zh" class="lang-btn rounded-full px-3 py-1.5 transition active:scale-95 text-slate-600" data-lang="zh">中文</button>
        </div>
      </div>
      <p class="text-sm leading-relaxed text-slate-600" data-i18n="subtitle">
        Guess the secret word. Each guess shows how close you are in meaning.
      </p>
    </header>

    <!-- 输入区 -->
    <section class="mb-4 shrink-0">
      <form id="guess-form" class="flex gap-2" autocomplete="off">
        <input
          id="guess-input"
          type="text"
          class="h-12 min-w-0 flex-1 rounded-xl border border-slate-300 bg-white px-4 text-lg shadow-sm outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200"
          placeholder="Type a word..."
          enterkeyhint="go"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        />
        <button
          type="submit"
          id="guess-btn"
          class="flex h-12 shrink-0 items-center gap-2 rounded-xl bg-indigo-500 px-5 text-lg font-semibold text-white shadow-md transition active:scale-95 hover:bg-indigo-600"
        >
          <i class="fa-solid fa-arrow-right"></i>
          <span data-i18n="guessBtn">Guess</span>
        </button>
      </form>
    </section>

    <!-- 历史猜测列表：撑满剩余屏幕高度，超出仅在框内滚动 -->
    <section id="guess-history" class="flex min-h-0 flex-1 flex-col">
      <h2 class="mb-2 flex shrink-0 items-center gap-2 text-sm font-semibold uppercase tracking-wide text-slate-500">
        <i class="fa-solid fa-list-ol"></i>
        <span data-i18n="historyTitle">Guesses</span>
        <span id="guess-count" class="ml-auto font-normal normal-case text-slate-400">0</span>
      </h2>
      <ul id="guess-list" class="min-h-0 flex-1 space-y-2 overflow-y-auto overscroll-contain pr-1">
        <!-- 由 JS 动态渲染 -->
        <li id="empty-hint" class="rounded-lg border border-dashed border-slate-300 py-8 text-center text-sm text-slate-400" data-i18n="emptyHint">
          No guesses yet. Start typing!
        </li>
      </ul>
    </section>

  </main>

  <script>
    // ========== 全局配置 ==========
    const CONFIG = {
      maxRank: 5000,
      unknownMin: 2000,
      unknownMax: 5000,
    };

    // ========== 英文 Mock 词库（排名越小越接近目标 coffee） ==========
    const wordDatabaseEn = {
      coffee: 1,
      espresso: 2,
      latte: 5,
      tea: 12,
      milk: 18,
      water: 25,
      drink: 35,
      cafe: 40,
      morning: 55,
      beans: 60,
      cup: 75,
      energy: 90,
      sugar: 110,
      breakfast: 130,
      apple: 500,
      car: 1200,
      dog: 2500,
      computer: 4000,
    };

    // ========== 中文 Mock 词库（目标词：咖啡） ==========
    const wordDatabaseZh = {
      咖啡: 1,
      浓缩咖啡: 2,
      拿铁: 5,
      茶: 12,
      牛奶: 18,
      水: 25,
      饮料: 35,
      咖啡馆: 40,
      早晨: 55,
      咖啡豆: 60,
      杯子: 75,
      能量: 90,
      糖: 110,
      早餐: 130,
      苹果: 500,
      汽车: 1200,
      狗: 2500,
      电脑: 4000,
    };

    // ========== 国际化文案 ==========
    const I18N = {
      en: {
        title: 'CloseWord',
        subtitle: 'Guess the secret word. Each guess shows how close you are in meaning.',
        guessBtn: 'Guess',
        placeholder: 'Type a word...',
        farAway: 'That word is far away.',
        duplicate: 'Already guessed.',
        langRequired: 'Please enter an English word.',
        winTitle: 'You got it!',
        winStats: (total, best) => `Guesses: ${total} · Best rank: #${best}`,
        playAgain: 'Play again',
        historyTitle: 'Guesses',
        emptyHint: 'No guesses yet. Start typing!',
      },
      zh: {
        title: 'CloseWord',
        subtitle: '猜出今天的神秘单词，系统会告诉你猜的词在含义上离目标有多近。',
        guessBtn: '猜测',
        placeholder: '输入一个词…',
        farAway: '该词较远',
        duplicate: '已经猜过了',
        langRequired: '请输入中文词语',
        winTitle: '恭喜通关！',
        winStats: (total, best) => `共猜测 ${total} 次 · 最佳排名 #${best}`,
        playAgain: '再玩一次',
        historyTitle: '猜测记录',
        emptyHint: '还没有猜测，开始输入吧！',
      },
    };

    // ========== 游戏状态 ==========
    let activeLang = 'en';
    let guesses = [];
    let gameWon = false;
    let toastTimer = null;
    let toastHideTimer = null;
    let lastGuessId = null;
    let highlightTimer = null;
    let confettiAnimId = null;
    let confettiParticles = [];

    /** 浮动 Toast 基础样式（fixed，不参与文档排版） */
    const TOAST_BASE_CLASS =
      'pointer-events-none fixed left-1/2 z-30 w-[min(88vw,20rem)] -translate-x-1/2 rounded-xl px-5 py-3 text-center text-base font-semibold shadow-2xl';

    // ========== DOM 引用 ==========
    const guessForm = document.getElementById('guess-form');
    const guessInput = document.getElementById('guess-input');
    const guessList = document.getElementById('guess-list');
    const emptyHint = document.getElementById('empty-hint');
    const guessCountEl = document.getElementById('guess-count');
    const toastEl = document.getElementById('toast');
    const winOverlay = document.getElementById('win-overlay');
    const winStatsEl = document.getElementById('win-stats');
    const playAgainBtn = document.getElementById('play-again-btn');
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    const langEnBtn = document.getElementById('lang-en');
    const langZhBtn = document.getElementById('lang-zh');

    // ========== 工具函数 ==========

    /** 获取当前语言文案 */
    function t(key, ...args) {
      const entry = I18N[activeLang][key];
      return typeof entry === 'function' ? entry(...args) : entry;
    }

    /** 获取当前词库 */
    function getActiveDatabase() {
      return activeLang === 'en' ? wordDatabaseEn : wordDatabaseZh;
    }

    /** 获取本局目标词 */
    function getTargetWord() {
      return activeLang === 'en' ? 'coffee' : '咖啡';
    }

    /** 标准化玩家输入 */
    function normalize(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return '';
      return activeLang === 'en' ? trimmed.toLowerCase() : trimmed;
    }

    /** 英文模式：仅允许拉丁字母 */
    function isEnglishWord(word) {
      return /^[a-z]+$/.test(word);
    }

    /** 中文模式：仅允许汉字 */
    function isChineseWord(word) {
      return /^[\u4e00-\u9fff]+$/.test(word);
    }

    /** 按当前语言模式校验输入 */
    function isValidInputForLang(word) {
      return activeLang === 'en' ? isEnglishWord(word) : isChineseWord(word);
    }

    /** 闭区间随机整数 */
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    /** 查询排名：词库命中用固定值，否则随机 2000–5000 */
    function lookupRank(word) {
      const db = getActiveDatabase();
      if (Object.prototype.hasOwnProperty.call(db, word)) {
        return { rank: db[word], isUnknown: false };
      }
      return {
        rank: randomInt(CONFIG.unknownMin, CONFIG.unknownMax),
        isUnknown: true,
      };
    }

    /** 根据排名计算进度条宽度百分比 */
    function barPercent(rank) {
      const pct = Math.max(
        8,
        Math.round((1 - (rank - 1) / (CONFIG.maxRank - 1)) * 100)
      );
      return Math.min(100, pct);
    }

    /** 根据排名返回进度条 Tailwind 背景色类 */
    function barColorClass(rank) {
      if (rank === 1) return 'bg-emerald-500';
      if (rank < 100) return 'bg-green-500';
      if (rank <= 500) return 'bg-amber-400';
      return 'bg-red-400 opacity-80';
    }

    /** 隐藏浮动 Toast（带淡出） */
    function hideFloatingToast() {
      toastEl.classList.remove('toast-show');
      toastEl.classList.add('toast-hide');
      clearTimeout(toastHideTimer);
      toastHideTimer = setTimeout(() => {
        toastEl.classList.add('hidden');
        toastEl.classList.remove('toast-hide');
        toastEl.innerHTML = '';
      }, 200);
    }

    /**
     * 显示浮动 Toast（不占文档流）
     * @param {string} html - 内容 HTML
     * @param {'guess'|'duplicate'|'lang'} variant - 样式变体
     * @param {number} duration - 显示毫秒数
     */
    function showFloatingToast(html, variant, duration = 2000) {
      clearTimeout(toastTimer);
      clearTimeout(toastHideTimer);
      toastEl.classList.remove('toast-hide', 'hidden');
      const variantClass =
        variant === 'guess'
          ? 'bg-indigo-600 text-white ring-4 ring-indigo-300/60 shadow-indigo-950/50'
          : 'bg-amber-50 text-amber-900 ring-2 ring-amber-300 shadow-amber-200/80';
      toastEl.className = `${TOAST_BASE_CLASS} ${variantClass} toast-show`;
      toastEl.style.bottom = 'calc(5.5rem + env(safe-area-inset-bottom, 0px))';
      const wrap = document.createElement('div');
      wrap.className = 'toast-pop-inner';
      wrap.innerHTML = html;
      toastEl.replaceChildren(wrap);
      toastTimer = setTimeout(hideFloatingToast, duration);
    }

    /** 每次成功猜测：展示词 + 排名，未知词附带「较远」副文案 */
    function showGuessToast(word, rank, isUnknown) {
      const main =
        '<div class="flex flex-wrap items-baseline justify-center gap-x-3 gap-y-1">' +
        `<span class="text-xl font-bold tracking-tight">${escapeHtml(word)}</span>` +
        `<span class="font-mono text-2xl font-bold tabular-nums text-indigo-100">#${rank}</span>` +
        '</div>';
      const sub = isUnknown
        ? `<div class="mt-1.5 text-sm font-medium text-indigo-100">${escapeHtml(t('farAway'))}</div>`
        : '';
      showFloatingToast(main + sub, 'guess', 2000);
    }

    /** 重复猜测提示 */
    function showDuplicateToast() {
      showFloatingToast(
        `<span class="text-lg font-bold">${escapeHtml(t('duplicate'))}</span>`,
        'duplicate',
        2000
      );
    }

    /** 语言不符提示（中文模式需中文，英文模式需英文） */
    function showLangRequiredToast() {
      showFloatingToast(
        `<span class="text-lg font-bold">${escapeHtml(t('langRequired'))}</span>`,
        'lang',
        2000
      );
    }

    /** 刷新所有 data-i18n 节点文案 */
    function applyI18n() {
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (I18N[activeLang][key] && typeof I18N[activeLang][key] !== 'function') {
          el.textContent = I18N[activeLang][key];
        }
      });
      guessInput.placeholder = t('placeholder');
      updateLangButtons();
    }

    /** 更新语言按钮高亮 */
    function updateLangButtons() {
      const isEn = activeLang === 'en';
      langEnBtn.className =
        'lang-btn rounded-full px-3 py-1.5 transition active:scale-95 ' +
        (isEn ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600');
      langZhBtn.className =
        'lang-btn rounded-full px-3 py-1.5 transition active:scale-95 ' +
        (!isEn ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600');
    }

    // ========== 渲染猜测列表 ==========
    function renderGuessList() {
      guessCountEl.textContent = String(guesses.length);

      if (guesses.length === 0) {
        guessList.innerHTML = '';
        const li = document.createElement('li');
        li.id = 'empty-hint';
        li.className =
          'rounded-lg border border-dashed border-slate-300 py-8 text-center text-sm text-slate-400';
        li.setAttribute('data-i18n', 'emptyHint');
        li.textContent = t('emptyHint');
        guessList.appendChild(li);
        return;
      }

      const sorted = [...guesses].sort((a, b) => a.rank - b.rank);
      guessList.innerHTML = '';

      sorted.forEach((g) => {
        const pct = barPercent(g.rank);
        const colorClass = barColorClass(g.rank);
        const isWin = g.rank === 1;

        const li = document.createElement('li');
        li.setAttribute('data-guess-id', String(g.id));
        const isNewGuess = g.id === lastGuessId;
        li.className =
          'relative overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm transition-transform' +
          (isWin ? ' win-row border-emerald-400' : '') +
          (isNewGuess ? ' guess-row-highlight' : '');

        const bar = document.createElement('div');
        bar.className =
          `absolute inset-y-0 left-0 transition-all duration-500 ease-out ${colorClass}`;
        bar.style.width = `${pct}%`;

        const content = document.createElement('div');
        content.className =
          'relative z-10 flex items-center justify-between gap-2 px-3 py-2.5';

        const wordSpan = document.createElement('span');
        wordSpan.className = 'truncate font-medium';
        if (isWin) {
          wordSpan.innerHTML =
            `<i class="fa-solid fa-trophy mr-1 text-amber-500"></i>${escapeHtml(g.word)}`;
        } else {
          wordSpan.textContent = g.word;
        }

        const rankSpan = document.createElement('span');
        rankSpan.className = 'shrink-0 font-mono text-sm tabular-nums text-slate-600';
        rankSpan.textContent = `#${g.rank}`;

        content.appendChild(wordSpan);
        content.appendChild(rankSpan);
        li.appendChild(bar);
        li.appendChild(content);
        guessList.appendChild(li);

        // 触发宽度动画：下一帧再设目标宽度
        requestAnimationFrame(() => {
          bar.style.width = `${pct}%`;
        });
      });

      // 新猜测行滚入视野
      if (lastGuessId) {
        const highlightEl = guessList.querySelector(
          `[data-guess-id="${lastGuessId}"]`
        );
        highlightEl?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    /** HTML 转义，防止 XSS */
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 提交猜测 ==========
    function submitGuess(raw) {
      if (gameWon) return;

      const word = normalize(raw);
      if (!word) return;

      if (!isValidInputForLang(word)) {
        showLangRequiredToast();
        return;
      }

      if (guesses.some((g) => g.word === word)) {
        showDuplicateToast();
        return;
      }

      const { rank, isUnknown } = lookupRank(word);
      const guessId = Date.now();
      guesses.push({ word, rank, id: guessId });

      lastGuessId = guessId;
      clearTimeout(highlightTimer);
      highlightTimer = setTimeout(() => {
        lastGuessId = null;
      }, 1000);

      renderGuessList();
      showGuessToast(word, rank, isUnknown);
      guessInput.value = '';
      guessInput.focus();

      if (rank === 1) {
        gameWon = true;
        const best = Math.min(...guesses.map((g) => g.rank));
        showWinOverlay(guesses.length, best);
        startConfetti();
      }
    }

    // ========== 胜利层 ==========
    function showWinOverlay(total, best) {
      winStatsEl.textContent = t('winStats', total, best);
      winOverlay.classList.remove('hidden');
      winOverlay.classList.add('flex');
      winOverlay.setAttribute('aria-hidden', 'false');
    }

    function hideWinOverlay() {
      winOverlay.classList.add('hidden');
      winOverlay.classList.remove('flex');
      winOverlay.setAttribute('aria-hidden', 'true');
    }

    // ========== Confetti 粒子系统 ==========
    function resizeConfettiCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    function startConfetti() {
      stopConfetti();
      resizeConfettiCanvas();
      const colors = ['#f59e0b', '#10b981', '#6366f1', '#ec4899', '#3b82f6', '#ef4444'];
      const count = 100;
      confettiParticles = [];

      for (let i = 0; i < count; i++) {
        confettiParticles.push({
          x: Math.random() * confettiCanvas.width,
          y: Math.random() * confettiCanvas.height - confettiCanvas.height,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 5,
          rotation: Math.random() * 360,
          vr: (Math.random() - 0.5) * 12,
          opacity: 1,
        });
      }

      let frame = 0;
      const maxFrames = 180;

      function tick() {
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        frame++;

        confettiParticles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.rotation += p.vr;
          if (frame > maxFrames * 0.6) {
            p.opacity = Math.max(0, p.opacity - 0.015);
          }

          confettiCtx.save();
          confettiCtx.globalAlpha = p.opacity;
          confettiCtx.translate(p.x, p.y);
          confettiCtx.rotate((p.rotation * Math.PI) / 180);
          confettiCtx.fillStyle = p.color;
          confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          confettiCtx.restore();
        });

        if (frame < maxFrames) {
          confettiAnimId = requestAnimationFrame(tick);
        } else {
          confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
          confettiAnimId = null;
        }
      }

      confettiAnimId = requestAnimationFrame(tick);
    }

    function stopConfetti() {
      if (confettiAnimId) {
        cancelAnimationFrame(confettiAnimId);
        confettiAnimId = null;
      }
      confettiParticles = [];
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    // ========== 重置本局 ==========
    function resetGame() {
      guesses = [];
      gameWon = false;
      guessInput.value = '';
      hideWinOverlay();
      stopConfetti();
      clearTimeout(toastTimer);
      clearTimeout(toastHideTimer);
      clearTimeout(highlightTimer);
      lastGuessId = null;
      toastEl.classList.add('hidden');
      toastEl.innerHTML = '';
      renderGuessList();
    }

    /** 切换语言并重置 */
    function setLanguage(lang) {
      if (lang === activeLang) return;
      activeLang = lang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      applyI18n();
      resetGame();
    }

    // ========== 事件绑定 ==========
    guessForm.addEventListener('submit', (e) => {
      e.preventDefault();
      submitGuess(guessInput.value);
    });

    playAgainBtn.addEventListener('click', () => {
      resetGame();
      guessInput.focus();
    });

    langEnBtn.addEventListener('click', () => setLanguage('en'));
    langZhBtn.addEventListener('click', () => setLanguage('zh'));

    window.addEventListener('resize', () => {
      if (confettiAnimId) resizeConfettiCanvas();
    });

    // ========== 初始化 ==========
    applyI18n();
    renderGuessList();
    resizeConfettiCanvas();
    guessInput.focus();
  </script>
</body>
</html>
