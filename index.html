<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>CloseWord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    input[type="text"] { font-size: 16px; }
    #guess-list { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
    @keyframes winPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .win-row { animation: winPulse 1.2s ease-in-out infinite; }
    @keyframes toastPop {
      from { opacity: 0; transform: scale(0.82); }
      to { opacity: 1; transform: scale(1); }
    }
    .toast-pop-inner { animation: toastPop 0.32s cubic-bezier(0.34, 1.45, 0.64, 1) forwards; }
    .toast-show { animation: none; }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
    .toast-hide { animation: toastOut 0.2s ease-in forwards; }
    @keyframes rowHighlight {
      0% { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.55); transform: scale(1.015); }
      100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
    }
    .guess-row-highlight {
      animation: rowHighlight 1s ease-out;
      border-color: rgb(99 102 241) !important;
      z-index: 1;
    }
    #confetti-canvas { pointer-events: none; }
    .screen { display: none; }
    .screen.active { display: flex; }
    /* 主页头图：透明底 PNG，与浅色背景自然融合 */
    .home-hero {
      background: transparent;
      filter: drop-shadow(0 12px 24px rgba(99, 102, 241, 0.18));
    }
    .home-hero img {
      display: block;
      max-height: 11rem;
    }
  </style>
</head>
<body class="box-border flex h-[100dvh] flex-col overflow-hidden bg-gradient-to-b from-slate-50 to-slate-100 text-slate-800 pb-[env(safe-area-inset-bottom)]">

  <div id="toast" class="pointer-events-none fixed left-1/2 z-30 hidden w-[min(88vw,20rem)] -translate-x-1/2 rounded-xl px-5 py-3 text-center text-base font-semibold shadow-2xl" role="alert" style="bottom: calc(5.5rem + env(safe-area-inset-bottom, 0px));"></div>
  <canvas id="confetti-canvas" class="fixed inset-0 z-40 w-full h-full"></canvas>

  <!-- 结算层 -->
  <div id="result-overlay" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm px-4" aria-hidden="true">
    <div class="relative w-full max-w-sm rounded-2xl bg-white p-8 text-center shadow-2xl">
      <div id="result-icon" class="mb-4 text-5xl"></div>
      <h2 id="result-title" class="mb-2 text-2xl font-bold"></h2>
      <p id="result-secret" class="mb-2 text-lg font-semibold text-indigo-600"></p>
      <p id="result-stats" class="mb-6 text-slate-600"></p>
      <div class="flex flex-col gap-2">
        <button id="result-replay-btn" type="button" class="h-12 w-full rounded-xl bg-emerald-500 text-lg font-semibold text-white shadow-lg transition active:scale-95 hover:bg-emerald-600"></button>
        <button id="result-home-btn" type="button" class="h-12 w-full rounded-xl border border-slate-200 bg-white text-lg font-semibold text-slate-700 transition active:scale-95 hover:bg-slate-50">返回主页</button>
      </div>
    </div>
  </div>

  <div id="app" class="relative z-10 mx-auto flex h-full min-h-0 w-full max-w-lg flex-col">

    <!-- 主页 -->
    <div id="screen-home" class="screen active min-h-0 flex-1 flex-col justify-center px-4 py-8">
      <div class="mb-8 text-center">
        <div class="home-hero mx-auto mb-4 flex w-full max-w-[18rem] items-center justify-center">
          <img
            src="assets/hero-mascot.png"
            alt="CloseWord 探险猜词"
            class="h-auto w-full object-contain"
            width="288"
            height="288"
            decoding="async"
          />
        </div>
        <h1 class="text-3xl font-bold tracking-tight">CloseWord</h1>
        <p class="mt-2 text-slate-600">猜词挑战</p>
      </div>
      <div class="space-y-4">
        <button type="button" id="btn-solo" class="flex w-full items-center gap-4 rounded-2xl border border-slate-200 bg-white p-5 text-left shadow-md transition active:scale-[0.98] hover:border-indigo-300">
          <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-100 text-indigo-600"><i class="fa-solid fa-user text-xl"></i></div>
          <div>
            <div class="font-bold text-lg">单人游戏</div>
            <div class="text-sm text-slate-500">练习模式，查看完整猜测记录</div>
          </div>
          <i class="fa-solid fa-chevron-right ml-auto text-slate-400"></i>
        </button>
        <button type="button" id="btn-battle" class="flex w-full items-center gap-4 rounded-2xl border border-slate-200 bg-white p-5 text-left shadow-md transition active:scale-[0.98] hover:border-rose-300">
          <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-rose-100 text-rose-600"><i class="fa-solid fa-users text-xl"></i></div>
          <div>
            <div class="font-bold text-lg">好友对战</div>
            <div class="text-sm text-slate-500">和好友比拼，先猜中者胜！</div>
          </div>
          <i class="fa-solid fa-chevron-right ml-auto text-slate-400"></i>
        </button>
      </div>
    </div>

    <!-- 单人：选语言 -->
    <div id="screen-solo-lang" class="screen min-h-0 flex-1 flex-col px-4 py-6">
      <button type="button" class="nav-back mb-4 flex items-center gap-1 text-sm text-slate-500" data-target="home"><i class="fa-solid fa-arrow-left"></i> 返回</button>
      <h2 class="mb-2 text-2xl font-bold">选择词库语言</h2>
      <p class="mb-6 text-sm text-slate-600">开局后不可更换语言 · 每局随机一个神秘词</p>
      <div class="space-y-3">
        <button type="button" class="solo-lang-pick flex w-full items-center justify-between rounded-xl border-2 border-slate-200 bg-white px-5 py-4 font-semibold transition hover:border-indigo-400" data-lang="en">
          <span>English</span><span class="text-sm font-normal text-slate-500"></span>
        </button>
        <button type="button" class="solo-lang-pick flex w-full items-center justify-between rounded-xl border-2 border-slate-200 bg-white px-5 py-4 font-semibold transition hover:border-indigo-400" data-lang="zh">
          <span>中文</span><span class="text-sm font-normal text-slate-500"></span>
        </button>
      </div>
    </div>

    <!-- 对战大厅 -->
    <div id="screen-lobby" class="screen min-h-0 flex-1 flex-col px-4 py-6">
      <button type="button" class="nav-back mb-4 flex items-center gap-1 text-sm text-slate-500" data-target="home"><i class="fa-solid fa-arrow-left"></i> 返回</button>
      <h2 class="mb-2 text-2xl font-bold">好友对战</h2>
      <p class="mb-4 text-sm text-slate-600">Phase 1：模拟对手自动陪玩</p>
      <button
        type="button"
        id="btn-invite-friends"
        class="mb-3 flex h-12 w-full items-center justify-center gap-2 rounded-xl border-2 border-dashed border-indigo-300 bg-indigo-50 text-base font-semibold text-indigo-700 transition active:scale-[0.98] hover:border-indigo-400 hover:bg-indigo-100"
      >
        <i class="fa-solid fa-user-plus"></i>
        邀请好友
      </button>
      <div id="invited-friends-section" class="mb-4 hidden">
        <p class="mb-2 text-xs font-medium text-slate-500">已邀请的好友</p>
        <div id="invited-friends-list" class="overflow-hidden rounded-xl bg-white shadow-sm ring-1 ring-slate-200"></div>
      </div>
      <p class="mb-2 text-sm font-medium text-slate-600">选择词库（房主）</p>
      <div class="mb-6 flex rounded-full bg-slate-200 p-1 text-sm font-medium">
        <button type="button" id="lobby-lang-en" class="lobby-lang-btn flex-1 rounded-full py-2 transition">EN</button>
        <button type="button" id="lobby-lang-zh" class="lobby-lang-btn flex-1 rounded-full py-2 transition">中文</button>
      </div>
      <div class="mb-6 rounded-xl border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600">
        <p><i class="fa-solid fa-robot mr-1 text-rose-500"></i> 对手：<strong>模拟玩家</strong></p>
        <p class="mt-2">仅可见对方最佳排名与次数，不可见具体词语。对手猜中后立即结束并公布答案。</p>
      </div>
      <button type="button" id="btn-start-battle" class="mt-auto h-12 w-full rounded-xl bg-rose-500 text-lg font-semibold text-white shadow-lg transition active:scale-95 hover:bg-rose-600">
        开始对战
      </button>
    </div>

    <!-- 游戏局内（单人 / 对战共用） -->
    <div id="screen-game" class="screen min-h-0 flex-1 flex-col px-4 py-6">
      <header class="mb-3 shrink-0">
        <div class="mb-2 flex items-center justify-between">
          <button type="button" id="game-back-btn" class="flex items-center gap-1 text-sm text-slate-500"><i class="fa-solid fa-arrow-left"></i> 退出</button>
          <span id="game-mode-badge" class="rounded-full bg-indigo-100 px-2.5 py-0.5 text-xs font-semibold text-indigo-700">单人</span>
        </div>
        <h1 class="flex items-center gap-2 text-xl font-bold">
          <i class="fa-solid fa-puzzle-piece text-indigo-500"></i> CloseWord
        </h1>
        <p id="game-subtitle" class="mt-1 text-sm text-slate-600"></p>
      </header>

      <!-- 对战：对手进度（不展示具体词） -->
      <section id="battle-panel" class="mb-3 hidden shrink-0 space-y-2 rounded-xl border border-rose-200 bg-white p-3 shadow-sm">
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">
          <i class="fa-solid fa-chart-line mr-1"></i>对局进度
        </p>
        <!-- 你 -->
        <div class="relative overflow-hidden rounded-lg border border-indigo-200 bg-slate-50 py-2 pl-3 pr-2">
          <div id="self-progress-bar" class="absolute inset-y-0 left-0 bg-indigo-400/35 transition-all duration-500" style="width:8%"></div>
          <div class="relative flex items-center justify-between text-sm">
            <span class="font-semibold text-indigo-700"><i class="fa-solid fa-user mr-1"></i>你</span>
            <span id="self-progress-text" class="font-mono text-xs tabular-nums text-slate-600">最佳 — · 0 次</span>
          </div>
        </div>
        <!-- 对手 -->
        <div class="relative overflow-hidden rounded-lg border border-rose-200 bg-slate-50 py-2 pl-3 pr-2">
          <div id="peer-progress-bar" class="absolute inset-y-0 left-0 bg-rose-400/35 transition-all duration-500" style="width:8%"></div>
          <div class="relative flex items-center justify-between text-sm">
            <span id="peer-name-label" class="font-semibold text-rose-700"><i class="fa-solid fa-robot mr-1"></i>对手</span>
            <span id="peer-progress-text" class="font-mono text-xs tabular-nums text-slate-600">最佳 — · 0 次</span>
          </div>
        </div>
        <p id="peer-hint" class="hidden text-center text-xs font-medium text-rose-600"></p>
      </section>

      <section class="mb-3 shrink-0">
        <form id="guess-form" class="flex gap-2" autocomplete="off">
          <input id="guess-input" type="text" class="h-12 min-w-0 flex-1 rounded-xl border border-slate-300 bg-white px-4 text-lg shadow-sm outline-none transition focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200" placeholder="输入一个词…" enterkeyhint="go" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <button type="submit" id="guess-btn" class="flex h-12 shrink-0 items-center gap-2 rounded-xl bg-indigo-500 px-5 text-lg font-semibold text-white shadow-md transition active:scale-95 hover:bg-indigo-600">
            <i class="fa-solid fa-arrow-right"></i><span id="guess-btn-label">猜测</span>
          </button>
        </form>
      </section>

      <section id="guess-history" class="flex min-h-0 flex-1 flex-col">
        <h2 class="mb-2 flex shrink-0 items-center gap-2 text-sm font-semibold uppercase tracking-wide text-slate-500">
          <i class="fa-solid fa-list-ol"></i>
          <span id="history-title">我的猜测</span>
          <span id="guess-count" class="ml-auto font-normal normal-case text-slate-400">0</span>
        </h2>
        <ul id="guess-list" class="min-h-0 flex-1 space-y-2 overflow-y-auto overscroll-contain pr-1"></ul>
      </section>
    </div>

  </div>

  <script>

    const I18N = {

    let invitedFriend = null;

    const TOAST_BASE_CLASS =
      'pointer-events-none fixed left-1/2 z-30 w-[min(88vw,20rem)] -translate-x-1/2 rounded-xl px-5 py-3 text-center text-base font-semibold shadow-2xl';

    // ========== DOM ==========
    const screens = {
      home: document.getElementById('screen-home'),
      soloLang: document.getElementById('screen-solo-lang'),
      lobby: document.getElementById('screen-lobby'),
      game: document.getElementById('screen-game'),
    };
    const guessForm = document.getElementById('guess-form');
    const guessInput = document.getElementById('guess-input');
    const guessList = document.getElementById('guess-list');
    const guessCountEl = document.getElementById('guess-count');
    const toastEl = document.getElementById('toast');
    const resultOverlay = document.getElementById('result-overlay');
    const resultIcon = document.getElementById('result-icon');
    const resultTitle = document.getElementById('result-title');
    const resultSecret = document.getElementById('result-secret');
    const resultStats = document.getElementById('result-stats');
    const resultReplayBtn = document.getElementById('result-replay-btn');
    const resultHomeBtn = document.getElementById('result-home-btn');
    const battlePanel = document.getElementById('battle-panel');
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    const gameModeBadge = document.getElementById('game-mode-badge');
    const gameSubtitle = document.getElementById('game-subtitle');
    const historyTitle = document.getElementById('history-title');
    const guessBtnLabel = document.getElementById('guess-btn-label');
    const invitedFriendsSection = document.getElementById('invited-friends-section');
    const invitedFriendsList = document.getElementById('invited-friends-list');
    const btnInviteFriends = document.getElementById('btn-invite-friends');
    const btnStartBattle = document.getElementById('btn-start-battle');
    const peerHint = document.getElementById('peer-hint');

    function t(key, ...args) {
      const entry = I18N[activeLang][key];
      return typeof entry === 'function' ? entry(...args) : entry;
    }

    /** 从当前语言的主题池中随机抽取本局神秘词 */
    function pickRandomPuzzle() {
      const pool = activeLang === 'en' ? PUZZLES_EN : PUZZLES_ZH;
      const picked = pool[randomInt(0, pool.length - 1)];
      currentPuzzle = {
        target: picked.target,
        theme: picked.theme,
        words: { ...picked.words },
      };
    }

    function getActiveDatabase() {
      return currentPuzzle ? currentPuzzle.words : {};
    }

    function getTargetWord() {
      return currentPuzzle ? currentPuzzle.target : '';
    }

    function normalize(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return '';
      return activeLang === 'en' ? trimmed.toLowerCase() : trimmed;
    }

    function isEnglishWord(word) { return /^[a-z]+$/.test(word); }
    function isChineseWord(word) { return /^[\u4e00-\u9fff]+$/.test(word); }
    function isValidInputForLang(word) {
      return activeLang === 'en' ? isEnglishWord(word) : isChineseWord(word);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function lookupRank(word) {
      const db = getActiveDatabase();
      if (Object.prototype.hasOwnProperty.call(db, word)) {
        const rank = db[word];
        return { rank, isUnknown: false, accuracy: accuracyFromRank(rank) };
      }
      // 词库外：内部用最差排名排序，展示 0%～5% 随机准确率（两位小数）
      return { rank: CONFIG.maxRank, isUnknown: true, accuracy: randomUnknownAccuracy() };
    }

    /** 排名 → 准确率（1.00%～100.00%，两位小数） */
    function accuracyFromRank(rank) {
      const raw = (1 - (rank - 1) / (CONFIG.maxRank - 1)) * 99 + 1;
      return Math.round(Math.max(1, Math.min(100, raw)) * 100) / 100;
    }

    /** 词库外：0.00%～5.00% 随机（两位小数） */
    function randomUnknownAccuracy() {
      return Math.floor(Math.random() * 501) / 100;
    }

    function formatAccuracy(acc) {
      return `${Number(acc).toFixed(2)}%`;
    }

    /** 猜测列表排序：准确率高的靠前（含词库外 0%～5% 按数值大小） */
    function compareGuessCloseness(a, b) {
      const byAcc = b.accuracy - a.accuracy;
      if (byAcc !== 0) return byAcc;
      return a.rank - b.rank;
    }

    /** 进度条宽度与准确率一致（略设下限便于看见极冷词） */
    function barWidthFromAccuracy(acc) {
      return Math.max(4, Math.min(100, acc));
    }

    function barColorClass(rank, isUnknown) {
      if (isUnknown) return 'bg-red-400 opacity-80';
      if (rank === 1) return 'bg-emerald-500';
      if (rank < 100) return 'bg-green-500';
      if (rank <= 500) return 'bg-amber-400';
      return 'bg-red-400 opacity-80';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== 邀请好友（演示） ==========
    function resetInvitedFriends() {
      invitedFriend = null;
      invitedFriendsSection.classList.add('hidden');
      invitedFriendsList.innerHTML = '';
      btnInviteFriends.disabled = false;
      btnInviteFriends.classList.remove('opacity-60');
      updateStartBattleButton();
    }

    /** 长条展示：头像 + 昵称 + 最快猜中 + 本月对战（仅一位好友） */
    function renderInvitedFriends() {
      if (!invitedFriend) {
        invitedFriendsList.innerHTML = '';
        return;
      }
      const f = invitedFriend;
      const initial = f.name.slice(0, 1);
      invitedFriendsList.innerHTML =
        '<div class="flex items-center gap-3 bg-gradient-to-r from-indigo-50/90 to-white px-4 py-3">' +
        `<div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-gradient-to-br ${f.bg} text-lg font-bold text-white shadow-md ring-2 ring-white">${escapeHtml(initial)}</div>` +
        '<div class="min-w-0 flex-1 text-left">' +
        `<p class="truncate text-base font-semibold text-slate-800">${escapeHtml(f.name)}</p>` +
        '<p class="mt-1 flex flex-wrap items-center gap-x-4 gap-y-1 text-xs text-slate-500">' +
        `<span><i class="fa-solid fa-bolt mr-1 text-amber-500"></i>最快猜中 <strong class="font-semibold text-slate-700">${f.fastestGuessSec}</strong> 秒</span>` +
        `<span><i class="fa-solid fa-calendar-days mr-1 text-indigo-500"></i>本月对战 <strong class="font-semibold text-slate-700">${f.battlesThisMonth}</strong> 场</span>` +
        '</p></div></div>';

    function inviteFriendsDemo() {
      if (invitedFriend) return;

    // ========== 导航 ==========
    function showScreen(name) {
      Object.values(screens).forEach((el) => el.classList.remove('active'));
      screens[name]?.classList.add('active');
    }

    function goHome() {

    function applyGameCopy() {
      gameSubtitle.textContent = t('subtitle');
      guessInput.placeholder = t('placeholder');
      guessBtnLabel.textContent = t('guessBtn');

    function startSoloGame(lang) {

    function startBattleGame(lang) {
      if (!invitedFriend) return;
      activeLang = lang;

      }

      resetBattlePeer();

    function resetBattlePeer() {
      const name = battle.peer?.name || '模拟玩家';
      battle.peer = { bestRank: null, bestAccuracy: null, guessCount: 0, won: false, name };
      battle.botUsedWords = new Set();
      const db = getActiveDatabase();
      const target = getTargetWord();
      battle.botCandidates = Object.keys(db)
        .filter((w) => w !== target)
        .sort((a, b) => db[a] - db[b]);
      renderBattleProgress();
    }

    // ========== Toast ==========
    function hideFloatingToast() {
      toastEl.classList.remove('toast-show');
      toastEl.classList.add('toast-hide');
      clearTimeout(toastHideTimer);
      toastHideTimer = setTimeout(() => {
        toastEl.classList.add('hidden');
        toastEl.classList.remove('toast-hide');
      }, 200);
    }

    function showFloatingToast(html, variant, duration = 2000) {
      clearTimeout(toastTimer);
      clearTimeout(toastHideTimer);
      toastEl.classList.remove('toast-hide', 'hidden');
      const variantClass =
        variant === 'guess'
          ? 'bg-indigo-600 text-white ring-4 ring-indigo-300/60 shadow-indigo-950/50'
          : 'bg-amber-50 text-amber-900 ring-2 ring-amber-300 shadow-amber-200/80';
      toastEl.className = `${TOAST_BASE_CLASS} ${variantClass} toast-show`;
      const wrap = document.createElement('div');
      wrap.className = 'toast-pop-inner';
      wrap.innerHTML = html;
      toastEl.replaceChildren(wrap);
      toastTimer = setTimeout(hideFloatingToast, duration);
    }

    function showGuessToast(word, accuracy, isUnknown) {
      const accLabel = formatAccuracy(accuracy);
      const main =
        '<div class="flex flex-wrap items-baseline justify-center gap-x-3 gap-y-1">' +
        `<span class="text-xl font-bold">${escapeHtml(word)}</span>` +
        `<span class="font-mono text-2xl font-bold tabular-nums text-indigo-100">${accLabel}</span></div>`;
      const sub = isUnknown ? `<div class="mt-1.5 text-sm text-indigo-100">${escapeHtml(t('farAway'))}</div>` : '';
      showFloatingToast(main + sub, 'guess', 2000);
    }

    function showDuplicateToast() {
      showFloatingToast(`<span class="text-lg font-bold">${escapeHtml(t('duplicate'))}</span>`, 'duplicate', 2000);
    }

    function showLangRequiredToast() {
      showFloatingToast(`<span class="text-lg font-bold">${escapeHtml(t('langRequired'))}</span>`, 'duplicate', 2000);
    }

    // ========== 对战进度条 ==========
    function getSelfBestGuess() {
      if (!guesses.length) return null;
      return [...guesses].sort(compareGuessCloseness)[0];
    }

    function renderBattleProgress() {
      if (gameMode !== 'battle') return;
      const selfBestG = getSelfBestGuess();
      const selfAcc = selfBestG ? selfBestG.accuracy : null;
      const peerAcc = battle.peer.bestAccuracy;

      document.getElementById('self-progress-bar').style.width =
        `${selfAcc == null ? 8 : barWidthFromAccuracy(selfAcc)}%`;
      document.getElementById('peer-progress-bar').style.width =
        `${peerAcc == null ? 8 : barWidthFromAccuracy(peerAcc)}%`;

      const selfText = selfAcc == null
        ? (activeLang === 'zh' ? '最佳 — · ' : 'Best — · ') + `${guesses.length} ` + (activeLang === 'zh' ? '次' : 'tries')
        : (activeLang === 'zh' ? `最佳 ${formatAccuracy(selfAcc)} · ${guesses.length} 次` : `Best ${formatAccuracy(selfAcc)} · ${guesses.length} tries`);
      const peerText = peerAcc == null
        ? (activeLang === 'zh' ? '最佳 — · ' : 'Best — · ') + `${battle.peer.guessCount} ` + (activeLang === 'zh' ? '次' : 'tries')
        : (activeLang === 'zh' ? `最佳 ${formatAccuracy(peerAcc)} · ${battle.peer.guessCount} 次` : `Best ${formatAccuracy(peerAcc)} · ${battle.peer.guessCount} tries`);

      document.getElementById('self-progress-text').textContent = selfText;
      document.getElementById('peer-progress-text').textContent = peerText;
    }

    function showPeerHint(msg) {
      peerHint.textContent = msg;
      peerHint.classList.remove('hidden');
      clearTimeout(showPeerHint._timer);
      showPeerHint._timer = setTimeout(() => peerHint.classList.add('hidden'), 2500);
    }

    // ========== 模拟对手 ==========
    function pickBotWord() {
      const target = getTargetWord();
      const remaining = battle.botCandidates.filter((w) => !battle.botUsedWords.has(w));
      // 约 12% 概率直接猜答案（加快结束）
      if (Math.random() < 0.12 || remaining.length === 0) return target;
      if (Math.random() < 0.65 && remaining.length) return remaining[0];
      if (remaining.length) return remaining[randomInt(0, Math.min(remaining.length - 1, 5))];
      return target;
    }

    function botSubmitGuess() {
      if (gameEnded || gameMode !== 'battle') return;
      const word = pickBotWord();
      battle.botUsedWords.add(word);
      const { rank, accuracy } = lookupRank(word);
      const prevBest = battle.peer.bestRank;
      battle.peer.guessCount += 1;
      if (battle.peer.bestRank == null || rank < battle.peer.bestRank) {
        battle.peer.bestRank = rank;
        battle.peer.bestAccuracy = accuracy;
      }
      renderBattleProgress();
      if (prevBest != null && battle.peer.bestRank < prevBest) {
        const peerAccHint = formatAccuracy(battle.peer.bestAccuracy);
        showPeerHint(
          activeLang === 'zh'
            ? `对手更接近了 · 当前最佳 ${peerAccHint}`
            : `Opponent got closer · best ${peerAccHint}`
        );
      }
      if (rank === 1) {
        battle.peer.won = true;
        finishGame('peer');
      }
    }

    function startBattleBot() {
      stopBattleBot();
      const tick = () => {
        botSubmitGuess();
        if (!gameEnded) {
          battle.botTimer = setTimeout(tick, randomInt(2800, 5500));
        }
      };
      battle.botTimer = setTimeout(tick, randomInt(1500, 3000));
    }

    function stopBattleBot() {
      clearTimeout(battle.botTimer);
      battle.botTimer = null;
    }

    // ========== 猜测列表 ==========
    function renderGuessList() {
      guessCountEl.textContent = String(guesses.length);
      if (guesses.length === 0) {
        guessList.innerHTML = '';
        const li = document.createElement('li');
        li.className = 'rounded-lg border border-dashed border-slate-300 py-8 text-center text-sm text-slate-400';
        li.textContent = t('emptyHint');
        guessList.appendChild(li);
        return;
      }
      const sorted = [...guesses].sort(compareGuessCloseness);
      guessList.innerHTML = '';
      sorted.forEach((g) => {
        const acc = g.accuracy;
        const pct = barWidthFromAccuracy(acc);
        const li = document.createElement('li');
        li.setAttribute('data-guess-id', String(g.id));
        li.className =
          'relative overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm' +
          (g.rank === 1 ? ' win-row border-emerald-400' : '') +
          (g.id === lastGuessId ? ' guess-row-highlight' : '');
        const bar = document.createElement('div');
        bar.className = `absolute inset-y-0 left-0 transition-all duration-500 ${barColorClass(g.rank, g.isUnknown)}`;
        bar.style.width = `${pct}%`;
        const content = document.createElement('div');
        content.className = 'relative z-10 flex items-center justify-between gap-2 px-3 py-2.5';
        const wordSpan = document.createElement('span');
        wordSpan.className = 'truncate font-medium';
        if (g.rank === 1) {
          wordSpan.innerHTML = `<i class="fa-solid fa-trophy mr-1 text-amber-500"></i>${escapeHtml(g.word)}`;
        } else {
          wordSpan.textContent = g.word;
        }
        const rankSpan = document.createElement('span');
        rankSpan.className = 'shrink-0 font-mono text-sm font-semibold tabular-nums text-slate-600';
        rankSpan.textContent = formatAccuracy(acc);
        content.appendChild(wordSpan);
        content.appendChild(rankSpan);
        li.appendChild(bar);
        li.appendChild(content);
        guessList.appendChild(li);
      });
      if (lastGuessId) {
        guessList.querySelector(`[data-guess-id="${lastGuessId}"]`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      renderBattleProgress();
    }

    // ========== 结算 ==========
    function finishGame(winner) {
      if (gameEnded) return;
      gameEnded = true;
      stopBattleBot();
      guessInput.disabled = true;
      document.getElementById('guess-btn').disabled = true;

      const secret = getTargetWord();
      const n = guesses.length;

      if (winner === 'self') {
        resultIcon.innerHTML = '<i class="fa-solid fa-trophy text-amber-400"></i>';
        resultTitle.textContent = gameMode === 'battle' ? t('battleWinTitle') : t('winTitle');
        resultTitle.className = 'mb-2 text-2xl font-bold text-emerald-600';
        resultStats.textContent = gameMode === 'battle' ? t('battleWinStats', n) : t('winStats', n, 1);
        startConfetti();
      } else {
        resultIcon.innerHTML = '<i class="fa-solid fa-flag text-rose-500"></i>';
        resultTitle.textContent = t('battleLoseTitle');
        resultTitle.className = 'mb-2 text-2xl font-bold text-rose-600';
        resultStats.textContent = t('battleLoseStats', n);
      }

      resultSecret.textContent = `${t('secretLabel')}：${secret}`;
      resultReplayBtn.textContent = gameMode === 'battle' ? t('replayBattle') : t('replaySolo');
      resultOverlay.classList.remove('hidden');
      resultOverlay.classList.add('flex');
      resultOverlay.setAttribute('aria-hidden', 'false');
    }

    function hideResultOverlay() {
      resultOverlay.classList.add('hidden');
      resultOverlay.classList.remove('flex');
      resultOverlay.setAttribute('aria-hidden', 'true');
    }

    function showSoloWinOverlay() {
      finishGame('self');
    }

    // ========== 玩家猜测 ==========
    function submitGuess(raw) {
      if (gameEnded) return;
      const word = normalize(raw);
      if (!word) return;
      if (!isValidInputForLang(word)) {
        showLangRequiredToast();
        return;
      }
      if (guesses.some((g) => g.word === word)) {
        showDuplicateToast();
        return;
      }

      const { rank, isUnknown, accuracy } = lookupRank(word);
      const guessId = Date.now();
      guesses.push({ word, rank, id: guessId, isUnknown, accuracy });
      lastGuessId = guessId;
      clearTimeout(highlightTimer);
      highlightTimer = setTimeout(() => { lastGuessId = null; }, 1000);

      renderGuessList();
      showGuessToast(word, accuracy, isUnknown);
      guessInput.value = '';
      if (!gameEnded) guessInput.focus();

      if (rank === 1) {
        if (gameMode === 'battle') {
          finishGame('self');
        } else {
          showSoloWinOverlay();
        }
      }
    }

    function resetRound() {
      pickRandomPuzzle();
      guesses = [];
      gameEnded = false;
      lastGuessId = null;
      guessInput.value = '';
      guessInput.disabled = false;
      document.getElementById('guess-btn').disabled = false;
      hideResultOverlay();
      stopConfetti();
      clearTimeout(toastTimer);
      clearTimeout(toastHideTimer);
      clearTimeout(highlightTimer);
      toastEl.classList.add('hidden');
      peerHint.classList.add('hidden');
      renderGuessList();
    }

    // ========== Confetti ==========
    function resizeConfettiCanvas() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }

    function startConfetti() {
      stopConfetti();
      resizeConfettiCanvas();
      const colors = ['#f59e0b', '#10b981', '#6366f1', '#ec4899', '#3b82f6', '#ef4444'];
      confettiParticles = Array.from({ length: 100 }, () => ({
        x: Math.random() * confettiCanvas.width,
        y: Math.random() * confettiCanvas.height - confettiCanvas.height,
        w: 6 + Math.random() * 6,
        h: 4 + Math.random() * 4,
        color: colors[randomInt(0, colors.length - 1)],
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 5,
        rotation: Math.random() * 360,
        vr: (Math.random() - 0.5) * 12,
        opacity: 1,
      }));
      let frame = 0;
      function tick() {
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        frame++;
        confettiParticles.forEach((p) => {
          p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rotation += p.vr;
          if (frame > 108) p.opacity = Math.max(0, p.opacity - 0.015);
          confettiCtx.save();
          confettiCtx.globalAlpha = p.opacity;
          confettiCtx.translate(p.x, p.y);
          confettiCtx.rotate((p.rotation * Math.PI) / 180);
          confettiCtx.fillStyle = p.color;
          confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          confettiCtx.restore();
        });
        if (frame < 180) confettiAnimId = requestAnimationFrame(tick);
        else { confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); confettiAnimId = null; }
      }
      confettiAnimId = requestAnimationFrame(tick);
    }

    function stopConfetti() {
      if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
      confettiAnimId = null;
      confettiParticles = [];
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    // ========== 大厅语言切换 ==========
    function updateLobbyLangButtons() {
      const isEn = lobbyLang === 'en';
      document.getElementById('lobby-lang-en').className =
        'lobby-lang-btn flex-1 rounded-full py-2 transition ' + (isEn ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600');

        'lobby-lang-btn flex-1 rounded-full py-2 transition ' + (!isEn ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-600');

    document.getElementById('btn-solo').addEventListener('click', () => showScreen('soloLang'));
    document.getElementById('btn-battle').addEventListener('click', () => {

    btnInviteFriends.addEventListener('click', inviteFriendsDemo);

    document.querySelectorAll('.nav-back').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.target === 'home') goHome();
      });
    });

    document.querySelectorAll('.solo-lang-pick').forEach((btn) => {
      btn.addEventListener('click', () => startSoloGame(btn.dataset.lang));
    });

    document.getElementById('lobby-lang-en').addEventListener('click', () => {
      lobbyLang = 'en';
      updateLobbyLangButtons();
    });
    document.getElementById('lobby-lang-zh').addEventListener('click', () => {
      lobbyLang = 'zh';
      updateLobbyLangButtons();
    });

    document.getElementById('btn-start-battle').addEventListener('click', () => {
      startBattleGame(lobbyLang);
    });

    document.getElementById('game-back-btn').addEventListener('click', () => {
      if (gameEnded || confirm(activeLang === 'zh' ? '确定退出本局？' : 'Leave this game?')) {
        stopBattleBot();
        goHome();
      }
    });

    guessForm.addEventListener('submit', (e) => {
      e.preventDefault();
      submitGuess(guessInput.value);
    });

    resultReplayBtn.addEventListener('click', () => {
      hideResultOverlay();
      if (gameMode === 'battle') {
        resetRound();
        resetBattlePeer();
        startBattleBot();
        guessInput.focus();
      } else {
        resetRound();
        guessInput.focus();
      }
    });

    resultHomeBtn.addEventListener('click', goHome);

    window.addEventListener('resize', () => {
      if (confettiAnimId) resizeConfettiCanvas();
    });

    // ========== 初始化 ==========
    updateLobbyLangButtons();
    updateStartBattleButton();
    resizeConfettiCanvas();
    showScreen('home');
  </script>
</body>
</html>
